  <!-- MC monogram -->
  <text x="256" y="268" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-size="188" font-weight="700" fill="#f5edd8" letter-spacing="-6">MC</text>
  <!-- LMT -->
  <text x="256" y="360" text-anchor="middle" font-family="Helvetica, 'Jost', sans-serif" font-size="52" letter-spacing="24" fill="#b8956a">LMT</text>
